services:
  openfang:
    build:
      context: .
      dockerfile: Dockerfile.dev-runner
    ports:
      - "4200:4200"
    volumes:
      - ./target/release/openfang:/usr/local/bin/openfang:ro
      - ./agents:/data/agents:ro
      - openfang-data:/data
      - ${HOME}/.claude:/root/.claude
      - ${HOME}/.config/claude-code:/root/.config/claude-code
    environment:
      - OPENFANG_LISTEN=0.0.0.0:4200
      - OPENFANG_HOME=/data
      - OPENFANG_API_KEY=dev-local-key
    entrypoint: ["/usr/local/bin/openfang"]
    command: ["start"]
    mem_limit: 4g
    memswap_limit: 6g
    cpus: 4
    # Private cgroup namespace — container sees its own cgroup root and can
    # create per-agent sub-cgroups under it for pids.max enforcement.
    cgroup: private
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  openfang-data:
