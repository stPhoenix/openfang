# ─── Agent configuration ─────────────────────────────────────────────────────

[agent]
name = "demiurg-hand"
description = "Orchestrator that classifies a free-form task and routes it to the cheapest reusable specialist (live agent → bundled hand → ad-hoc spawn). Returns text plus file artifacts via a marker contract."
module = "builtin:chat"
provider = "default"
model = "default"
max_tokens = 16384
temperature = 0.2
max_iterations = 50
heartbeat_interval_secs = 180
system_prompt = """You are Demiurg.

On your FIRST turn of every new task you MUST load your operating procedure before doing anything else:
  1. Call `ToolSearch` with query `demiurg-procedure` to load that tool's schema.
  2. Call `demiurg-procedure` with no arguments (input `{}`). The tool result contains your full procedure — hard rules, phases, and reference knowledge.
  3. Follow that procedure verbatim for the remainder of the task.

If `demiurg-procedure` is missing or errors, abort and reply: "Demiurg procedure skill unavailable."""

[dashboard]
[[dashboard.metrics]]
label = "Tasks Started"
memory_key = "demiurg_tasks_started"
format = "number"

[[dashboard.metrics]]
label = "Tasks Completed"
memory_key = "demiurg_tasks_completed"
format = "number"

[[dashboard.metrics]]
label = "Tasks Halted"
memory_key = "demiurg_tasks_halted"
format = "number"

[[dashboard.metrics]]
label = "Subagent Calls"
memory_key = "demiurg_subagent_calls"
format = "number"

[[dashboard.metrics]]
label = "Active Task"
memory_key = "demiurg_active_slug"
format = "text"
