id = "demiurg"
name = "Demiurg Orchestrator Hand"
description = "Vendor-neutral orchestrator that classifies free-form tasks by reasoning step-by-step (LLM classifier subagent as fallback when uncertain), discovers available specialists (live agents + hands), dispatches the cheapest reusable resource, and returns a synthesized text response plus optional file artifacts. Designed to be the default A2A entry point for external clients."
category = "productivity"
icon = "\U0001F9D9"
tools = [
  # Workspace
  "file_read",
  "file_write",
  "file_list",
  # Discovery
  "agent_list",
  "hand_list",
  "hand_status",
    "agent_template_list",
  # Activation / reuse / cleanup
  "hand_activate",
  "hand_deactivate",
  "agent_send",
    "agent_send_async",
  "agent_kill",
  "agent_spawn",
    "agent_template_spawn",
  # Delegation (used for the tiny classifier subagent and any ad-hoc tool-less specialist)
  "agent_delegate",
  "agent_delegate_async",
  "delegation_await",
  # Persistence + signalling
  "memory_store",
  "memory_recall",
  "event_publish",
]


# Skills allowlist — the procedure skill below is REQUIRED.
# It carries the verbose system_prompt and SKILL.md content; the
# stub in [agent].system_prompt above tells the agent to load it via
# ToolSearch + zero-arg call on its first turn. The evolution engine
# can mutate this skill in-place via SkillRegistry.
skills = ["demiurg-procedure"]
# ─── Configurable settings ───────────────────────────────────────────────────

[[settings]]
key = "parallelism"
label = "Dispatch parallelism"
description = "Whether independent subtasks fan out in parallel (agent_delegate_async + delegation_await) or run sequentially."
setting_type = "select"
default = "auto"

[[settings.options]]
value = "sequential"
label = "Sequential"

[[settings.options]]
value = "parallel"
label = "Parallel"

[[settings.options]]
value = "auto"
label = "Auto (parallel when independent)"

[[settings]]
key = "max_subagent_calls"
label = "Max subagent calls"
description = "Hard cap on total agent_delegate / agent_send / hand_activate calls per task. Execution stops when reached."
setting_type = "select"
default = "20"

[[settings.options]]
value = "10"
label = "10 calls"

[[settings.options]]
value = "20"
label = "20 calls"

[[settings.options]]
value = "50"
label = "50 calls"

[[settings.options]]
value = "unlimited"
label = "Unlimited"

[[settings]]
key = "max_total_input_tokens"
label = "Max total input tokens"
description = "Soft budget across all subagent calls. When exceeded, finish the in-flight task then halt."
setting_type = "select"
default = "300000"

[[settings.options]]
value = "100000"
label = "100K tokens"

[[settings.options]]
value = "300000"
label = "300K tokens"

[[settings.options]]
value = "1000000"
label = "1M tokens"

[[settings.options]]
value = "unlimited"
label = "Unlimited"

[[settings]]
key = "auto_kill_spawned"
label = "Auto-kill spawned agents"
description = "When demiurg activates a hand or spawns an ad-hoc agent for a task, deactivate/kill it after the task completes. Live agents that already existed before the task are never killed."
setting_type = "toggle"
default = "true"

[[settings]]
key = "preserve_workspace"
label = "Preserve workspace after completion"
description = "Keep the orchestrations/<slug>-<ts>/ directory after the task is reported complete. Useful for debugging."
setting_type = "toggle"
default = "true"

[[settings]]
key = "auto_resume"
label = "Auto-resume on startup"
description = "On boot, scan orchestrations/ for sub-folders with non-done state.md rows and continue them automatically."
setting_type = "toggle"
default = "false"

[[settings]]
key = "provider"
label = "LLM provider"
description = "Provider for the demiurg orchestrator. Children spawned with `default` provider/model inherit this via parent-overlay."
setting_type = "select"
default = "default"

[[settings.options]]
value = "default"
label = "Daemon default"

[[settings.options]]
value = "anthropic"
label = "Anthropic"

[[settings.options]]
value = "openai"
label = "OpenAI"

[[settings.options]]
value = "google"
label = "Google"

[[settings.options]]
value = "qwen"
label = "Qwen"

[[settings.options]]
value = "moonshot"
label = "Moonshot"

[[settings.options]]
value = "groq"
label = "Groq"

[[settings]]
key = "model"
label = "LLM model"
description = "Model used by the demiurg agent. Overrides the daemon default. Children spawned with `default` model inherit this."
setting_type = "select"
default = "claude-sonnet-4-6"

[[settings.options]]
value = "default"
label = "Daemon default"

[[settings.options]]
