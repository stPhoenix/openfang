id = "pro-researcher"
name = "Pro Researcher Hand"
description = "Workspace-based deep researcher with subagent decomposition, plan approval, resumable state, and bounded context"
category = "productivity"
icon = "\U0001F52C"
long_running = true
tools = [
  "file_read",
  "file_write",
  "file_list",
  "agent_delegate",
  "agent_delegate_async",
  "delegation_await",
  "agent_list",
  "memory_store",
  "memory_recall",
  "knowledge_add_entity",
  "knowledge_add_relation",
  "knowledge_query",
  "event_publish",
  # Whitelisted only so the kernel's privilege-subset rule lets us delegate
  # children that use them. The orchestrator MUST NOT call these directly —
  # the system prompt enforces this. They live in the searcher / extractor
  # subagents.
  "web_search",
  "web_fetch",
  # New tools (C5/C6) — direct extraction + parallel search aggregation.
  # These replace the per-URL extractor and per-query searcher subagent loops
  # on the bulk happy path. Extractor subagent is kept as the browser-fallback
  # path for SPA pages.
  "web_fetch_extract",
  "web_search_batch",
  # Browser tools (C3) — fallback for SPA pages where raw web_fetch returns
  # a shell. Whitelisted so the extractor subagent can use them; the
  # orchestrator typically calls web_fetch_extract first.
  "browser_navigate",
  "browser_read_page",
  "browser_close",
    # Whitelisted only so the kernel's privilege-subset rule lets us delegate
    # the yt-extractor subagent. The orchestrator MUST NOT call shell_exec
    # directly — the system prompt enforces this. The [exec_policy] block
    # below restricts shell_exec invocations on this hand to `yt-dlp` only.
    "shell_exec",
]


# Skills allowlist — the procedure skill below is REQUIRED.
# It carries the verbose system_prompt and SKILL.md content; the
# stub in [agent].system_prompt above tells the agent to load it via
# ToolSearch + zero-arg call on its first turn. The evolution engine
# can mutate this skill in-place via SkillRegistry.
skills = ["pro-researcher-procedure"]
# ─── Exec policy ────────────────────────────────────────────────────────────
# Hand-level override of the kernel's default "shell_exec → Full mode" grant.
# Restricts ALL shell_exec calls (orchestrator and subagents both) to yt-dlp.
# This is enforced by openfang-runtime::subprocess_sandbox::validate_command_allowlist
# at every shell_exec invocation, so the yt-extractor subagent literally
# cannot run anything else even if its system prompt is jailbroken.

[exec_policy]
mode = "allowlist"
allowed_commands = ["yt-dlp"]
timeout_secs = 300
no_output_timeout_secs = 120

# ─── Prerequisites ──────────────────────────────────────────────────────────

[[requires]]
key = "yt-dlp"
label = "yt-dlp must be installed"
requirement_type = "binary"
check_value = "yt-dlp"
description = "yt-dlp downloads video metadata and auto-generated captions from YouTube. Used by the yt-extractor subagent when the planner detects a YouTube URL among search results."

[requires.install]
macos = "brew install yt-dlp"
windows = "winget install yt-dlp.yt-dlp"
linux_apt = "sudo apt install yt-dlp"
linux_dnf = "sudo dnf install yt-dlp"
linux_pacman = "sudo pacman -S yt-dlp"
pip = "python3 -m pip install -U \"yt-dlp[default]\""
manual_url = "https://github.com/yt-dlp/yt-dlp/wiki/Installation"
estimated_time = "1-2 min"

# ─── Configurable settings ───────────────────────────────────────────────────

[[settings]]
key = "plan_approval"
label = "Require plan approval"
description = "Pause after plan.md is written; wait for explicit user approval before subagent calls begin"
setting_type = "toggle"
default = "true"

[[settings]]
key = "auto_resume"
label = "Auto-resume on startup"
description = "On boot, scan the `research/` directory for sub-folders with non-done state.md rows and offer to continue"
setting_type = "toggle"
default = "true"

[[settings]]
key = "research_depth"
label = "Research Depth"
description = "Controls sub-question count and sources per sub-question"
setting_type = "select"
default = "thorough"

[[settings.options]]
value = "quick"
label = "Quick (2-3 sub-questions, 3 sources each)"

[[settings.options]]
value = "thorough"
label = "Thorough (4-6 sub-questions, 5 sources each)"

[[settings.options]]
value = "exhaustive"
label = "Exhaustive (6-8 sub-questions, 8+ sources each)"

[[settings]]
key = "max_subagent_calls"
label = "Max Subagent Calls"
description = "Hard cap on total agent_delegate calls per investigation. Execution stops when reached."
setting_type = "select"
default = "50"

[[settings.options]]
value = "20"
label = "20 calls"

[[settings.options]]
value = "50"
label = "50 calls"

[[settings.options]]
value = "100"
label = "100 calls"

[[settings.options]]
value = "unlimited"
label = "Unlimited"

[[settings]]
key = "max_total_input_tokens"
label = "Max Total Input Tokens"
description = "Soft budget per investigation. When exceeded, finish current task then halt."
setting_type = "select"
default = "1500000"

[[settings.options]]
value = "200000"
label = "200K tokens"

[[settings.options]]
value = "500000"
label = "500K tokens"

[[settings.options]]
value = "1000000"
label = "1M tokens"

[[settings.options]]
value = "1500000"
label = "1.5M tokens"

[[settings.options]]
value = "unlimited"
label = "Unlimited"

[[settings]]
key = "output_style"
label = "Output Style"
description = "Final report format"
setting_type = "select"
default = "detailed"

[[settings.options]]
value = "brief"
label = "Brief (executive summary, 1-2 pages)"

[[settings.options]]
value = "detailed"
label = "Detailed (structured report, 5-10 pages)"

[[settings.options]]
value = "academic"
label = "Academic (formal paper with citations)"

[[settings.options]]
value = "executive"
label = "Executive (key findings + recommendations)"

[[settings]]
key = "citation_style"
label = "Citation Style"
