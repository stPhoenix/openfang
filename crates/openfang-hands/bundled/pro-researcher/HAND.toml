Message: `Sub-question: <SUBQ>\\nQuery: <QUERY>`

timeout_seconds: compute as `1200 + (Attempts * 1200)`, where Attempts is the value read from state.md for THIS row BEFORE this dispatch. So Attempts=0 → 1200 (20m), Attempts=1 → 2400 (40m), Attempts=2 → 3600 (60m). Hard rule 6 already excludes Attempts ≥ 3. Pass the computed integer to `agent_delegate` as `timeout_seconds`.

On return:
- First apply the infrastructure-error check (see "After EVERY agent_delegate return" below).
- Strip any `[taint:untrusted_agent]` prefix before parsing.
- Parse the JSON array. If parse fails: leave Status=`pending` (Attempts already incremented) so the next iteration retries; the Hard rule 6 cap will mark it `failed` after the 3rd attempt.
- file_write `searches/search_T<N>.md` with a markdown rendering of the array. (The `searches/` subfolder is auto-created on first write.)
- **URL fill with global dedup**: walk the result array in rank order (highest relevance first). For each URL, check the `## Seen URLs` section of state.md. If the URL is already present, skip it and try the next URL. Fill rows in this order: first the SQ's `min_sources_per_sq` *primary* extract rows, then the remaining secondary extract rows, in rank order. Append every picked URL to `## Seen URLs`. If fewer than K unique URLs remain after dedup, mark the *unfilled* surplus rows `pending-reserve` with Note=`awaiting-research` (NOT `cancelled`) — Phase 6's shortfall recovery (see "SQ shortfall check" under Bulk-extract dispatch and the synth on-return gate under TaskType=synthesize) may later promote them or replace them via a recovery re-search. Synthesize for that sub-question proceeds only when at least `min_sources_per_sq` extracts are `done` (the synth on-return gate enforces this).
- **Reclassify YouTube URLs**: after URL fill, walk the newly populated extract rows for this sub-question. For each row whose URL host matches `youtube.com`, `www.youtube.com`, `m.youtube.com`, or `youtu.be`, change its `Assigned` column from `extractor` to `yt-extractor` so the Phase 6 dispatcher routes it through TaskType=youtube_extract. file_write state.md once after all reclassifications.
- Mark T<N> `done`, write Output=`searches/search_T<N>.md`, file_write state.md.

### Extract batch fan-out (parallel — preferred path)

When the next runnable batch consists of two or more extract tasks (either type — `extract` or `youtube_extract` — for the same sub-question, their search dep is `done`, all are `pending`, none have status=`cancelled`), dispatch them in parallel instead of one-by-one. Both task types share the same extract output schema (CRAAP markdown in `extracts/extract_T<N>.md`) and join the SAME batch — mix them freely:

1. For each extract row in the batch:
   - Mark it `in_progress`, increment Attempts, write a temporary placeholder `Assigned=<role>-T<N>:queued` (role is `extractor` for plain extract, `yt-extractor` for youtube_extract), file_write state.md.
   - Call `agent_delegate_async` with the per-task manifest_toml — pick the manifest documented under "TaskType=extract" for plain rows or under "TaskType=youtube_extract" for YouTube rows (substituting `<TASK_ID>` and `<URL>`). Use the SAME async dispatch — do not pass `timeout_seconds` (the async tool has no timeout knob; the barrier carries it).
   - Capture the returned `delegation_id` and update the row's `Assigned` column to `<role>-T<N>:<delegation_id>`. file_write state.md after every dispatch so a kernel restart can resume.
2. Once all extracts in the batch are dispatched, call `delegation_await` ONCE with:
   - `delegation_ids`: the full list of ids you just collected.
   - `timeout_seconds`: `min(3700, 1200 + max_attempts_in_batch * 1200)` where `max_attempts_in_batch` is the max Attempts value across the batch (typically 1 for a fresh batch → 2400s, 2 for second-attempt rows → 3600s).
3. Parse the response. It is JSON `{"results":[{"delegation_id","success","result","error"}, ...], "completed":N, "timed_out":bool}`. For each result, look up the matching state.md row by delegation_id, then apply the SAME on-return logic documented under "TaskType=extract" below (taint strip, IRRELEVANT/FETCH_FAILED handling, file_write `extracts/extract_T<N>.md`, mark `done`/`skipped`/`failed`).
4. For any id where `error == "timed_out"`: leave Status=`pending` (Attempts already incremented), write Note=`timed_out` so the next iteration retries. The Hard rule 6 cap still bounds retries.
5. Search and synthesize tasks remain SYNC (`agent_delegate`) — only extract batches use this fan-out.

If the batch is a single extract task, you MAY use sync `agent_delegate` directly (no barrier overhead). Use the async fan-out when the batch is 2+.

Resumability: the delegation_id stored in `Assigned` is the only state needed to recover. After a kernel restart mid-barrier, re-issue `delegation_await` with the same ids; the kernel's outcome cache returns any that already finished.

### TaskType=extract
agent_delegate manifest_toml:

```toml
name = \"<PARENT_NAME>-extractor-<TASK_ID>\"
version = \"0.1.0\"
description = \"Page-extraction specialist for pro-researcher\"
author = \"openfang\"
module = \"builtin:chat\"

[model]
provider = \"default\"
model = \"default\"
max_tokens = 4096
temperature = 0.2
system_prompt = \"\"\"You are Extractor. Single goal: given ONE URL and a sub-question, fetch the page ONCE and extract only what answers the sub-question.

Tools: web_fetch, browser_navigate, browser_read_page, browser_close (browser tools are the SPA fallback path — see below).

HARD LIMIT — one-shot contract:
- EXACTLY ONE web_fetch call per run on the happy path. A second web_fetch is a protocol violation.
- If the URL host matches the deny list (<DENIED_HOSTS>), output `IRRELEVANT: denylisted-host` WITHOUT calling web_fetch.
- After the fetch returns, inspect the body:
  * If body length < 5 KB AND contains login/signin form markers (no article content) → output `IRRELEVANT: login-wall` and STOP.
  * If the body matches SPA markers (`__NEXT_DATA__`, `data-turbo`, `__NUXT__`, `ng-version`, `data-reactroot`) AND the visible text is short, try the browser fallback EXACTLY ONCE:
    1. browser_navigate(url=URL)
    2. browser_read_page() to get the rendered text
    3. browser_close()
    Then run the CRAAP extraction on the rendered text. If the rendered text is still empty or login-walled, output `IRRELEVANT: spa-or-login-wall` and STOP. Do NOT loop the browser path.
  * If the body has real article content → emit the CRAAP block below.
- If web_fetch returns a non-2xx HTTP status or an error, output `FETCH_FAILED: <status-or-error>` and STOP.
- Do NOT retry the same URL. Do NOT try a different path. Do NOT fetch a second non-fallback URL. The orchestrator will replace dead URLs.

OUTPUT (strict markdown, <=2000 tokens):

- **Source**: <url> | <publish date if visible> | <author if visible>
- **Quality** (CRAAP A/B/C/D): <letter> — <one-line reason>
- **Claims**:
  - \"<near-exact claim>\" — supports/contradicts/refines
  - ...
- **Data points**:
  - <metric>: <value with units> (<source quote if from a number table>)
- **Quotes** (verbatim, <=4):
  - \"<quote>\"
- **Gaps**: <what this source did NOT address>

Rules:
- NEVER paraphrase a claim and present it as a quote.
- NEVER include unrelated content.
- Prefer DEPTH over brevity within the 2000-token budget — capture mechanical detail, exact procedures, numeric values, and cited primary sources. The synthesizer reads ONLY your extract; do not assume it can re-read the page.\"\"\"

[capabilities]
tools = [\"web_fetch\", \"browser_navigate\", \"browser_read_page\", \"browser_close\"]

[autonomous]
# 1 raw fetch + (optional) 3 browser steps + 1 emit = 5 iter ceiling.
max_iterations = 5
```

