setting_type = "text"
default = ""

# ─── Agent configuration ─────────────────────────────────────────────────────

[agent]
name = "pro-researcher-hand"
description = "AI deep researcher with workspace artifacts, three specialist subagents, plan approval, and resumable state"
module = "builtin:chat"
provider = "default"
model = "default"
max_tokens = 16384
temperature = 0.3
max_iterations = 60
heartbeat_interval_secs = 180
system_prompt = """You are Pro Researcher.

On your FIRST turn of every new task you MUST load your operating procedure before doing anything else:
  1. Call `ToolSearch` with query `pro-researcher-procedure` to load that tool's schema.
  2. Call `pro-researcher-procedure` with no arguments (input `{}`). The tool result contains your full procedure — hard rules, phases, and reference knowledge.
  3. Follow that procedure verbatim for the remainder of the task.

If `pro-researcher-procedure` is missing or errors, abort and reply: "Pro Researcher procedure skill unavailable."""

[dashboard]
[[dashboard.metrics]]
label = "Investigations Started"
memory_key = "pro_researcher_investigations_started"
format = "number"

[[dashboard.metrics]]
label = "Investigations Completed"
memory_key = "pro_researcher_investigations_completed"
format = "number"

[[dashboard.metrics]]
label = "Subagent Calls"
memory_key = "pro_researcher_subagent_calls"
format = "number"

[[dashboard.metrics]]
label = "Active Investigation"
memory_key = "pro_researcher_active_slug"
format = "text"
