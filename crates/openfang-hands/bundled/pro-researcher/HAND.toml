id = "pro-researcher"
name = "Pro Researcher Hand"
description = "Workspace-based deep researcher with subagent decomposition, plan approval, resumable state, and bounded context"
category = "productivity"
icon = "\U0001F52C"
long_running = true
tools = [
  "file_read",
  "file_write",
  "file_list",
  "agent_delegate",
  "agent_delegate_async",
  "delegation_await",
  "agent_list",
  "memory_store",
  "memory_recall",
  "knowledge_add_entity",
  "knowledge_add_relation",
  "knowledge_query",
  "event_publish",
  # Whitelisted only so the kernel's privilege-subset rule lets us delegate
  # children that use them. The orchestrator MUST NOT call these directly —
  # the system prompt enforces this. They live in the searcher / extractor
  # subagents.
  "web_search",
  "web_fetch",
  # New tools (C5/C6) — direct extraction + parallel search aggregation.
  # These replace the per-URL extractor and per-query searcher subagent loops
  # on the bulk happy path. Extractor subagent is kept as the browser-fallback
  # path for SPA pages.
  "web_fetch_extract",
  "web_search_batch",
  # Browser tools (C3) — fallback for SPA pages where raw web_fetch returns
  # a shell. Whitelisted so the extractor subagent can use them; the
  # orchestrator typically calls web_fetch_extract first.
  "browser_navigate",
  "browser_read_page",
  "browser_close",
    # Whitelisted only so the kernel's privilege-subset rule lets us delegate
    # the yt-extractor subagent. The orchestrator MUST NOT call shell_exec
    # directly — the system prompt enforces this. The [exec_policy] block
    # below restricts shell_exec invocations on this hand to `yt-dlp` only.
    "shell_exec",
]

# ─── Exec policy ────────────────────────────────────────────────────────────
# Hand-level override of the kernel's default "shell_exec → Full mode" grant.
# Restricts ALL shell_exec calls (orchestrator and subagents both) to yt-dlp.
# This is enforced by openfang-runtime::subprocess_sandbox::validate_command_allowlist
# at every shell_exec invocation, so the yt-extractor subagent literally
# cannot run anything else even if its system prompt is jailbroken.

[exec_policy]
mode = "allowlist"
allowed_commands = ["yt-dlp"]
timeout_secs = 300
no_output_timeout_secs = 120

# ─── Prerequisites ──────────────────────────────────────────────────────────

[[requires]]
key = "yt-dlp"
label = "yt-dlp must be installed"
requirement_type = "binary"
check_value = "yt-dlp"
description = "yt-dlp downloads video metadata and auto-generated captions from YouTube. Used by the yt-extractor subagent when the planner detects a YouTube URL among search results."

[requires.install]
macos = "brew install yt-dlp"
windows = "winget install yt-dlp.yt-dlp"
linux_apt = "sudo apt install yt-dlp"
linux_dnf = "sudo dnf install yt-dlp"
linux_pacman = "sudo pacman -S yt-dlp"
pip = "python3 -m pip install -U \"yt-dlp[default]\""
manual_url = "https://github.com/yt-dlp/yt-dlp/wiki/Installation"
estimated_time = "1-2 min"

