## Phase 5 — Approval gate

By the time control reaches this phase, plan.md has already been validated and possibly rewritten by the Critic in Phase 3 — so the user is approving the cleaned plan, not the original.

If `plan_approval` setting is Enabled:
1. file_read plan.md and pull the `## Validation` section.
2. Reply to the user with a one-message summary:
   - "Plan ready: <N> sub-questions, <M> tasks, est. <X>k input tokens, cap <Y> calls."
   - If validation made any changes, add: "Critic revised the plan: <original_tasks> → <revised_tasks> tasks. Issues fixed: <one-line list>."
   - If plan.md Status contains `Validation: warning`, add VERBATIM: "⚠️ <warning text from the Validation section>"
   - "Files: research/<slug>-<ts>/{general.md, plan.md, state.md, index.md}"
   - "Reply `approve` to start, or `revise: <changes>` to adjust."
3. STOP and wait for the next user message.
4. On `approve` (case-insensitive substring match): update plan.md Status to `Phase: executing`, write `Started: <ts>`, proceed to Phase 6.
5. On `revise: <text>`: amend plan.md/state.md per request, then re-run Phase 5. Do NOT re-run Phase 3 (validation is single-pass per investigation).

If `plan_approval` is Disabled, proceed straight to Phase 6. If plan.md Status contains `Validation: warning`, log the warning to ledger.jsonl as `{"task":"validation_warning","note":"<text>","ts":"<iso>"}` so the user can see it after the fact.

## Phase 6 — Execution loop

Repeat until: all tasks `done` or `failed`, OR max_subagent_calls reached, OR max_total_input_tokens exceeded.

### Bulk-path fast lane (preferred — use whenever possible)

The orchestrator has two direct tools that replace the per-URL extractor and per-query searcher subagent loops on the happy path:

- `web_search_batch(queries, top_n_per_query)` — runs N searches in parallel, dedupes URLs across queries, drops denylisted hosts via `[web.fetch].deny_domains`, and returns a single ranked URL list as JSON. Replaces N sequential searcher subagent spawns.
- `web_fetch_extract(url, sub_question, max_tokens)` — fetches a URL with the protected pipeline (SSRF + deny list), short-circuits SPA / login-wall pages without an LLM call, otherwise runs ONE one-shot LLM completion to produce the CRAAP extract. Returns the CRAAP markdown, `IRRELEVANT: <reason>`, or `FETCH_FAILED: <error>`. Replaces a per-URL extractor subagent (no spawn, no agent loop).

**Use the bulk path when:**
- A search task can be dispatched alongside other search tasks → use `web_search_batch` with all their queries in one call. Skip the per-task `agent_delegate` dispatch.
- An extract task's URL is NOT a YouTube URL → use `web_fetch_extract`. Skip the extractor subagent spawn entirely. Dispatch multiple in parallel by emitting multiple `web_fetch_extract` tool_use blocks in ONE assistant turn — the agent loop executes parallel tool_use blocks concurrently.

**Use the subagent (fallback) path when:**
- The URL is a YouTube URL → use the `yt-extractor` subagent (TaskType=youtube_extract below). yt-dlp + transcript parsing require shell_exec.
- `web_fetch_extract` returned `IRRELEVANT: spa-or-login-wall` AND you suspect the page has real content behind a JS render → optionally fall back to the `extractor` subagent (TaskType=extract), which has the browser_navigate fallback path. Limit ONE browser fallback per investigation across all URLs (browser sessions are heavy).
- Iteration ≥ 3 attempts on a URL with `web_fetch_extract` → mark the row failed, do NOT escalate. The orchestrator already deduped URLs at search time, so replacements aren't guaranteed.

### Bulk-search dispatch (Phase 6 entry point)

If multiple search rows are runnable (status=`pending`, deps empty, attempts < 3), batch them:
1. Collect `(task_id, query)` pairs for every runnable search row in this iteration.
2. Mark each row `in_progress`, increment Attempts, write a single file_write to state.md.
3. Call `web_search_batch({"queries": [<query1>, <query2>, ...], "top_n_per_query": K})` where K = 3 for quick, 5 for thorough, 8 for exhaustive.
4. Parse the returned `{"queries": [...], "urls": [{url, title, snippet, score, matched_queries}, ...]}`. The orchestrator decides which URL goes to which search task based on `matched_queries` (a URL that appeared in multiple queries can serve any of them).
5. For each search task: file_write `searches/search_T<N>.md` with the URL list that matched its query, mark `done`, Output=`searches/search_T<N>.md`. Apply the URL fill + dedup + YouTube reclassification logic documented under "TaskType=search" below.

### Bulk-extract dispatch (per sub-question batches)

Dispatch runnable `extract` rows across sub-questions, **capped at 8 tool_use blocks per assistant turn**. Larger fan-outs (e.g. 25+ extracts at once) routinely cause the LLM to emit narration text without any tool calls — the loop then exits and the investigation freezes (see Hard rule 9). Chunking to ≤8 keeps every turn small enough that the model reliably emits the structured tool_calls block.

1. Build the runnable set: across ALL sub-questions whose search dep is `done`, collect every extract row with status=`pending` (or just-promoted `pending-reserve`) whose URL host is NOT YouTube. YouTube rows go through the yt-extractor subagent (see TaskType=youtube_extract).
2. **Cap the batch at 8 rows for this turn.** Pick the first 8 in row order. Leftover runnable rows stay `pending` and are picked up in the next iteration's batch (state.md tracks which ones are already `in_progress` so dedup is automatic).
3. For each of the picked ≤8 rows: mark `in_progress`, increment Attempts. Single file_write to state.md at the end of the batch.
4. Emit ONE `web_fetch_extract` tool_use block per row, all in the same assistant turn — the agent loop runs them concurrently:
   `web_fetch_extract({"url": <URL>, "sub_question": <SUBQ>, "max_tokens": 1024})`
   Per Hard rule 9: if you write any prose describing this dispatch ("now firing extracts for SQ1..."), the tool_use blocks MUST be in this same turn. Either emit both, or skip the prose entirely and emit only the tool calls.
5. When all results return as tool_result blocks in the next turn, for each:
   - If result starts with `IRRELEVANT:` → mark row `skipped`, write reason to Note. **Then run the SQ shortfall check (see below).**
   - If starts with `FETCH_FAILED:` → mark row `failed`, write the error to Note. **Then run the SQ shortfall check.**
   - If `IRRELEVANT: spa-or-login-wall` AND no browser fallback used yet this investigation → optionally re-dispatch via TaskType=extract subagent (browser fallback path). At most ONE such fallback per investigation. (Still run the SQ shortfall check — the browser fallback may succeed or fail.)
   - Otherwise → file_write `extracts/extract_T<N>.md` with the CRAAP body verbatim, mark `done`, Output=`extracts/extract_T<N>.md`.
   After processing results, if more `pending` extracts remain runnable (the leftover from step 2's cap), the next iteration's batch picks them up automatically.

6. **SQ shortfall check** (run after marking any extract row `skipped`/`failed` in this batch):
   1. Count this sub-question's extract rows where Status=`done`: call it `done_count`. Read `min_sources_per_sq` from plan.md (default thorough=3).
   2. If `done_count` ≥ `min_sources_per_sq`, no action.
   3. Else if a `pending-reserve` row exists for this SQ **with a URL already filled** → promote it to `pending` (will dispatch in a later iteration's batch). file_write state.md. No re-search needed.
   4. Else (no usable reserves left) → check the SQ's `Recovery` column in state.md's per-SQ section. If `Recovery=none`: enqueue ONE recovery re-search:
      - Append a new search row `T<next>` whose query is the original SQ's search query refined by appending `-site:<host>` for every host that returned `IRRELEVANT:`/`FETCH_FAILED:` in this SQ this run (suppress repeat-fails) and adding one expanded term from the SQ description (e.g., for "common mistakes" add `OR pitfalls OR errors`).
      - Append 3 new extract rows `T<next+1..3>` depending on the new search task. Mark all `pending`, Assigned blank.
      - Set `Recovery=searched` on the SQ's row in state.md.
      - file_write state.md. The next iteration's runnable-task scan picks up the new search and the bulk-search dispatch handles it.
      If `Recovery=searched` already (one recovery loop already used): no further action — synthesize will proceed with what it has and the synth on-return gate decides whether to accept.
   5. Hard cap: at most ONE recovery re-search per SQ per investigation. Hard rule 6 (Attempts ≥ 3) is still the absolute floor.

### Single-task / fallback dispatch loop

If neither bulk path applies (e.g. a single retry, a YouTube URL, a forced browser fallback), fall back to per-task dispatch:

1. file_read state.md.
2. Pick the next task with status=`pending` whose dependencies are all `done`. If none, but tasks are `in_progress`, you have a deadlock — write a Note and continue with the next runnable task.
3. **Pre-dispatch retry check** (Hard rule 6): if the picked task's Attempts ≥ 3, set Status=`failed`, write the last error into Note, file_write state.md, and pick the next task. Repeat until a dispatchable task is found or the queue is empty.
4. Mark that task `in_progress`, increment Attempts, file_write state.md.
5. **Substitute placeholders** in the manifest_toml before dispatch:
   - `<PARENT_NAME>` → your own agent name (loaded in Phase 0 step 2 from AGENT.json). Phase 3 also substitutes this when dispatching the Critic. The kernel registry's name index is global, so only `<PARENT_NAME>` makes the subagent name unique across concurrent investigations.
   - `<TASK_ID>` → the current task number (e.g. `T1`, `T7`).
   - `<QUERY>` / `<SUBQ>` / `<URL>` → as documented per task type below.

   The combined name `<PARENT_NAME>-<role>-<TASK_ID>` (e.g. `teddy5-searcher-T1`) is unique across investigations, parallel dispatches, and retries. If two delegations share a name, the second fails with `Agent already exists`.
6. Dispatch by task type:

### TaskType=search
