[[settings.options]]
value = "inline_url"
label = "Inline URLs"

[[settings.options]]
value = "footnotes"
label = "Footnotes"

[[settings.options]]
value = "academic_apa"
label = "Academic (APA)"

[[settings.options]]
value = "numbered"
label = "Numbered references"

[[settings]]
key = "language"
label = "Language"
description = "Primary language for research and output"
setting_type = "select"
default = "english"

[[settings.options]]
value = "english"
label = "English"

[[settings.options]]
value = "spanish"
label = "Spanish"

[[settings.options]]
value = "french"
