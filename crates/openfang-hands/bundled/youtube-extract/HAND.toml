id = "youtube-extract"
name = "YouTube Extract Hand"
description = "Extracts transcripts, metadata, and structured insights from YouTube videos via yt-dlp subtitles (manual preferred, auto-captions fallback). Returns raw JSON, summaries, or both."
category = "content"
icon = "\U0001F3A5"
version = "0.1.0"

tools = [
    "shell_exec",
    "file_read",
    "file_write",
    "file_list",
    "memory_store",
    "memory_recall",
    "knowledge_add_entity",
    "knowledge_add_relation",
    "knowledge_query",
]


# Skills allowlist — the procedure skill below is REQUIRED.
# It carries the verbose system_prompt and SKILL.md content; the
# stub in [agent].system_prompt above tells the agent to load it via
# ToolSearch + zero-arg call on its first turn. The evolution engine
# can mutate this skill in-place via SkillRegistry.
skills = ["youtube-extract-procedure"]
# ─── Prerequisites ──────────────────────────────────────────────────────────

[[requires]]
key = "yt-dlp"
label = "yt-dlp must be installed"
requirement_type = "binary"
check_value = "yt-dlp"
description = "yt-dlp downloads video metadata and auto-generated captions from YouTube. Auto-captions are this hand's only transcription source — no Whisper fallback."

[requires.install]
macos = "brew install yt-dlp"
windows = "winget install yt-dlp.yt-dlp"
linux_apt = "sudo apt install yt-dlp"
linux_dnf = "sudo dnf install yt-dlp"
linux_pacman = "sudo pacman -S yt-dlp"
pip = "python3 -m pip install -U \"yt-dlp[default]\""
manual_url = "https://github.com/yt-dlp/yt-dlp/wiki/Installation"
estimated_time = "1-2 min"

# ─── Configurable settings ──────────────────────────────────────────────────

[[settings]]
key = "output_mode"
label = "Output Mode"
description = "What the hand returns: raw transcript JSON, an LLM-written summary, or both"
setting_type = "select"
default = "summary"

[[settings.options]]
value = "raw_json"
label = "Raw JSON (metadata + segments)"

[[settings.options]]
value = "summary"
label = "Summary only"

[[settings.options]]
value = "both"
label = "Raw JSON + summary"

[[settings]]
key = "summary_style"
label = "Summary Style"
description = "Template applied when output_mode includes a summary"
setting_type = "select"
default = "detailed"

[[settings.options]]
value = "brief"
label = "Brief (5-10 key bullet points)"

[[settings.options]]
value = "detailed"
label = "Detailed (sections, data points, timestamps)"

[[settings.options]]
value = "executive"
label = "Executive (bottom line, findings, recommendations)"

[[settings.options]]
value = "qa"
label = "Q&A (top 10 questions with timestamped answers)"

[[settings]]
key = "language"
label = "Caption Language"
description = "Passed to yt-dlp as --sub-langs. If unavailable in the requested language, hand falls back to the first available subtitle language and notes the swap."
setting_type = "select"
default = "en"

[[settings.options]]
value = "en"
label = "English"

[[settings.options]]
value = "es"
label = "Spanish"

[[settings.options]]
value = "fr"
label = "French"

[[settings.options]]
value = "de"
label = "German"

[[settings.options]]
value = "ja"
label = "Japanese"

[[settings.options]]
value = "zh"
label = "Chinese"

[[settings.options]]
value = "auto"
label = "Auto (first available)"

[[settings]]
key = "chunk_long_videos"
label = "Chunk Long Videos"
description = "When transcript is large, summarize per chapter or per 10-min window then merge. Forced ON for videos longer than 2 hours regardless of this setting."
setting_type = "toggle"
default = "true"

[[settings]]
key = "save_transcript_file"
label = "Save Transcript File"
description = "Persist raw transcript JSON to the agent workspace at transcripts/{video_id}.json"
setting_type = "toggle"
default = "true"

# ─── Agent configuration ────────────────────────────────────────────────────

[agent]
name = "youtube-extract-hand"
description = "AI YouTube info extractor — pulls transcripts, metadata, and structured insights from any YouTube video"
module = "builtin:chat"
provider = "default"
model = "default"
max_tokens = 8192
temperature = 0.3
max_iterations = 60
heartbeat_interval_secs = 90
system_prompt = """You are YouTube Extract.

On your FIRST turn of every new task you MUST load your operating procedure before doing anything else:
  1. Call `ToolSearch` with query `youtube-extract-procedure` to load that tool's schema.
  2. Call `youtube-extract-procedure` with no arguments (input `{}`). The tool result contains your full procedure — hard rules, phases, and reference knowledge.
  3. Follow that procedure verbatim for the remainder of the task.

If `youtube-extract-procedure` is missing or errors, abort and reply: "YouTube Extract procedure skill unavailable."""

# ─── Dashboard ──────────────────────────────────────────────────────────────

[dashboard]
[[dashboard.metrics]]
label = "Videos Extracted"
memory_key = "youtube_extract_videos_done"
format = "number"

[[dashboard.metrics]]
label = "Transcripts Saved"
memory_key = "youtube_extract_transcripts_saved"
format = "number"

[[dashboard.metrics]]
label = "Total Minutes Processed"
memory_key = "youtube_extract_total_seconds"
format = "duration"

[[dashboard.metrics]]
label = "Summaries Generated"
memory_key = "youtube_extract_summaries"
format = "number"
